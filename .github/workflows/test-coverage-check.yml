name: Test Coverage Check

# Informational-only: detects new hooks and components added in a PR that have
# no corresponding test file. Posts a comment listing gaps and applies the
# "needs-tests" label. Never blocks merge — always exits 0.
#
# Full test suite runs separately in coverage-gate.yml (per-file line coverage)
# and coverage-hourly.yml (project-wide). This workflow is a lightweight
# file-existence check that runs without npm install.

on:
  pull_request:
    branches: [main]
    paths:
      - 'web/src/hooks/**'
      - 'web/src/components/**'
      - 'scripts/check-test-coverage.sh'
      - '.github/workflows/test-coverage-check.yml'

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: test-coverage-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-coverage-check:
    name: Detect untested files
    if: github.repository == 'kubestellar/console'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect untested files
        id: coverage
        run: |
          chmod +x scripts/check-test-coverage.sh

          # Script writes /tmp/test-coverage-gaps.md and prints gap_count=N
          OUTPUT=$(./scripts/check-test-coverage.sh origin/main 2>&1)
          echo "$OUTPUT"

          GAP_COUNT=$(echo "$OUTPUT" | grep '^gap_count=' | cut -d= -f2 || echo "0")
          echo "gap_count=${GAP_COUNT}" >> "$GITHUB_OUTPUT"

          # Publish to the job summary so it's visible without expanding the step
          if [ -f /tmp/test-coverage-gaps.md ]; then
            cat /tmp/test-coverage-gaps.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post or update PR comment
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            try {
              const fs = require('fs');
              if (!fs.existsSync('/tmp/test-coverage-gaps.md')) return;

              const body = fs.readFileSync('/tmp/test-coverage-gaps.md', 'utf8').trim();
              if (!body) return;

              // Unique marker so we can find and update the comment on re-runs
              const marker = '<!-- test-coverage-check-report -->';
              const fullBody = `${marker}\n${body}`;

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const existing = comments.find(c => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: fullBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: fullBody,
                });
              }
            } catch (err) {
              core.warning(`Could not post coverage comment: ${err.message}`);
            }

      - name: Manage needs-tests label
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GAP_COUNT: ${{ steps.coverage.outputs.gap_count }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          LABEL="needs-tests"

          # Create label if it doesn't exist yet (idempotent)
          gh label create "$LABEL" \
            --repo "$REPO" \
            --color "C5DEF5" \
            --description "PR adds source files without corresponding tests" \
            2>/dev/null || true

          if [ "${GAP_COUNT:-0}" -gt 0 ]; then
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "$LABEL" 2>/dev/null || true
          else
            # Clean up the label when tests have been added (e.g. on a follow-up push)
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "$LABEL" 2>/dev/null || true
          fi
